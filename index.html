<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Rotation Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div id="app">
    <header id="header">
      <div class="logo-row">
        <span class="logo-icon">⬡</span>
        <h1>Mental Rotation <span class="accent">Arena</span></h1>
      </div>

      <div id="difficulty-bar">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn active" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>

      <div id="stats">
        <div class="stat-card">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Round</span>
          <span class="stat-value"><span id="round">1</span><span class="stat-dim">/<span id="total-rounds">10</span></span></span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Streak 🔥</span>
          <span class="stat-value" id="streak">0</span>
        </div>
        <div class="stat-card timer-card">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">12</span>
        </div>
      </div>

      <div id="timer-bar"><div id="timer-bar-fill"></div></div>
    </header>

    <main id="game-area">
      <div class="shape-panel">
        <div class="panel-label">Reference</div>
        <div class="canvas-wrap left-wrap">
          <canvas id="canvas-left"></canvas>
        </div>
      </div>

      <div class="vs-col">
        <div class="vs-badge">VS</div>
      </div>

      <div class="shape-panel">
        <div class="panel-label right">Comparison</div>
        <div class="canvas-wrap right-wrap">
          <canvas id="canvas-right"></canvas>
        </div>
      </div>
    </main>

    <div id="controls">
      <button id="btn-same" class="btn btn-same">
        <span class="btn-icon">✓</span>
        <span class="btn-text">Same Shape</span>
        <kbd>S</kbd>
      </button>
      <button id="btn-mirror" class="btn btn-mirror">
        <span class="btn-icon">✕</span>
        <span class="btn-text">Mirror Image</span>
        <kbd>M</kbd>
      </button>
    </div>

    <div id="feedback"></div>
  </div>

  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div class="overlay-icon" id="overlay-icon">🏆</div>
      <h2 id="overlay-title">Game Over</h2>
      <p id="overlay-rating"></p>
      <p id="overlay-msg"></p>
      <button id="overlay-btn">Play Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
